name: Deploy Testing

on:
  pull_request:
    types: [closed]
    branches:
      - testing
  push:
    branches:
      - development

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    environment: alpha
    concurrency:
      group: deploy-testing-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache dependencies and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/portfolio/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('portfolio/**/package-lock.json') }}-${{ hashFiles('portfolio/**/*.[jt]s', 'portfolio/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('portfolio/**/package-lock.json') }}-

      - name: Install dependencies
        working-directory: ./portfolio
        run: npm ci

      - name: Run Lint (Guardrail)
        working-directory: ./portfolio
        run: npm run lint

      - name: Build Portfolio
        working-directory: ./portfolio
        env:
          # Use standard / for alpha branch deployment on GH Pages if it's the root 
          BASE_PATH: ""
        run: |
          npm run build

      - name: Deploy to GitHub Branch (Alpha)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages-alpha
          folder: ./portfolio/out
