name: Deploy Testing

on:
  pull_request:
    types: [closed]
    branches:
      - testing
  push:
    branches:
      - development

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: alpha
    concurrency:
      group: deploy-testing-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache dependencies and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/portfolio/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('portfolio/**/package-lock.json') }}-${{ hashFiles('portfolio/**/*.[jt]s', 'portfolio/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('portfolio/**/package-lock.json') }}-

      - name: Install dependencies
        working-directory: ./portfolio
        run: npm ci

      - name: Run Lint (Guardrail)
        working-directory: ./portfolio
        run: npm run lint

      - name: Build Portfolio
        working-directory: ./portfolio
        env:
          # Derive BASE_PATH from the last segment of the SFTP_REMOTE_PATH
          # Note: If deploying to root, this logic might need adjustment or a dedicated secret.
          BASE_PATH: /${{ github.head_ref || 'testing' }} 
        run: |
          # Use the environment variable if you want to override based on server subfolders
          # For example, if SFTP_REMOTE_PATH is /var/www/testing, BASE_PATH should be /testing
          REMOTE_PATH="${{ vars.SFTP_REMOTE_PATH }}"
          DIR_NAME=$(basename "$REMOTE_PATH")
          export BASE_PATH="/$DIR_NAME"
          npm run build

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ vars.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          local_path: './portfolio/out/*'
          remote_path: ${{ vars.SFTP_REMOTE_PATH }}
          delete_remote_files: true
