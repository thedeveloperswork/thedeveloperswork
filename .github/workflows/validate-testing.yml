name: Validate Testing (Guardrail)

on:
  pull_request:
    branches:
      - testing

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache dependencies and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/portfolio/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('portfolio/**/package-lock.json') }}-${{ hashFiles('portfolio/**/*.[jt]s', 'portfolio/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('portfolio/**/package-lock.json') }}-

      - name: Install dependencies
        working-directory: ./portfolio
        run: npm ci

      - name: Run Lint
        working-directory: ./portfolio
        run: npm run lint

      - name: Run Tests
        working-directory: ./portfolio
        run: npm run test
