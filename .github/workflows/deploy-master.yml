name: Deploy Master

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-master-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache dependencies and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/portfolio/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('portfolio/**/package-lock.json') }}-${{ hashFiles('portfolio/**/*.[jt]s', 'portfolio/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('portfolio/**/package-lock.json') }}-

      - name: Install dependencies
        working-directory: ./portfolio
        run: npm ci

      - name: Run Lint (Strict Guardrail)
        working-directory: ./portfolio
        run: npm run lint -- --max-warnings 0

      - name: Build Portfolio
        working-directory: ./portfolio
        env:
          # Master usually deploys to the root of the domain or specific repo subpath
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./portfolio/out
          publish_branch: gh-pages
          force_orphan: true
